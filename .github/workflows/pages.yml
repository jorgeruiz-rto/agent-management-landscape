name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      # HubSpot proof-point generation is DISABLED for public GitHub Pages.
      # GitHub Pages is public; baking real customer names + deal amounts into it
      # would leak CRM data. Re-enable the two steps below ONLY on a gated deploy
      # (GH Enterprise Pages access control, or a host behind SSO), after adding
      # the HUBSPOT_MCP_API_KEY secret.
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - name: Refresh HubSpot proof points
      #   env:
      #     HUBSPOT_MCP_API_KEY: ${{ secrets.HUBSPOT_MCP_API_KEY }}
      #   run: |
      #     if [ -n "$HUBSPOT_MCP_API_KEY" ]; then
      #       node hubspot-proof.js
      #     else
      #       echo "HUBSPOT_MCP_API_KEY not set — skipping proof-point refresh"
      #     fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
